services:
  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: ${COMPOSE_PROJECT_NAME}-kafka-exporter
    command:
      - "--kafka.server=kafka:9092"
      - "--web.listen-address=:9308"
      - "--topic.filter=.*"          # все топики
      - "--group.filter=.*"          # все consumer groups
      - "--log.level=info"
    ports:
      - "9308:9308"
    networks:
      - esb_network
    depends_on:
      - kafka
    restart: unless-stopped