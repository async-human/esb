global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']

    # ── Kafka Broker via JMX Exporter ──────────────────────────────
  # Broker-level: produce/fetch request rates, bytes in/out,
  # under-replicated partitions, handler idle %
  - job_name: kafka-jmx
    static_configs:
      - targets: [ "kafka:9404" ]
    metric_relabel_configs:
      # Добавляем понятный лейбл для фильтрации в Grafana
      - target_label: kafka_cluster
        replacement: esb-local
 
  # ── kafka-exporter (consumer group lag) ────────────────────────
  # Consumer lag per group/topic/partition — главная SLO метрика
  - job_name: kafka-exporter
    static_configs:
      - targets: [ "kafka-exporter:9308" ]
    metric_relabel_configs:
      - target_label: kafka_cluster
        replacement: esb-local