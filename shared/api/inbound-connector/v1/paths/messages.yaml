post:
  summary: Принять новое сообщение
  operationId: postMessage
  tags:
    - Messages
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/Message.yaml'
  responses:
    '201':
      description: Сообщение успешно принято
    '400':
      description: Ошибка валидации
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Error.yaml'